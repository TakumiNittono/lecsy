# Supabase ローカル開発設定
# このファイルは Supabase CLI で使用されます

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000", "lecsy://auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Edge Functions JWT設定
# 本番環境では全てのfunctionでJWT検証を有効化
# save-transcript関数は手動でJWT検証を行うため、自動検証を無効化
[functions.save-transcript]
verify_jwt = false

[functions.summarize]
verify_jwt = false

[functions.summarize-stream]
verify_jwt = false

[functions.stripe-webhook]
# Webhookは外部からのリクエストのため、Stripe署名で検証
verify_jwt = false

[functions.delete-account]
verify_jwt = true

# B2B 系 Edge Functions
# Supabase の新形式 ES256 access token に platform-level JWT verify が
# 対応していないため、関数コード側で auth.getUser() による検証に統一する。
# (この設定が無いと "Invalid JWT" で 401 になる)
[functions.org-create]
verify_jwt = false

[functions.org-grant-ownership]
verify_jwt = false

[functions.org-csv-import]
verify_jwt = false

[functions.org-ai-assist]
verify_jwt = false

[functions.send-org-invite]
verify_jwt = false

[functions.submit-report]
verify_jwt = false

# Deepgram / translation / Stripe系（W01-W06追加分）
# 同じく ES256 JWT 対応のため platform-level verify を無効化し、
# 関数コード側で supabase.auth.getUser() + プラン判定を行う
[functions.deepgram-token]
verify_jwt = false

[functions.translate-realtime]
verify_jwt = false

[functions.create-checkout-session]
verify_jwt = false

[functions.create-portal-session]
verify_jwt = false

[functions.deepgram-balance-check]
verify_jwt = false

[functions.notify-pilot-lead]
verify_jwt = false

# 母用 MP3 文字起こし (PINゲートで保護、JWT不要)
[functions.mv3-transcribe]
verify_jwt = false
